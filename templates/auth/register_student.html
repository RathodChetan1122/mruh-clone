{% extends "base.html" %}
{% block content %}
<h2>Student Registration</h2>
<form method="post" action="{{ url_for('register_student') }}">
    <input type="text" name="name" placeholder="Full name" required><br><br>
    <input type="email" name="email" placeholder="Email" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>
    <input type="text" name="roll_no" placeholder="Roll No (eg: R123)" required><br><br>
    <input type="text" name="course" placeholder="Course (eg: B.Tech CSE)" required><br><br>
    <input type="text" name="year" placeholder="Year (eg: 2nd Year)" required><br><br>
    <button type="submit">Register</button>
</form>
{% endblock %}
